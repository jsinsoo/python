<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리스트 슬라이싱 단답형 20문항</title>
<style>
*{box-sizing:border-box}body{font-family:'Malgun Gothic',Arial,sans-serif;margin:0;background:#f4f7fb;color:#222}.wrap{max-width:1100px;margin:0 auto;padding:24px}header{background:linear-gradient(135deg,#2b5876,#4e4376);color:white;padding:28px;border-radius:18px;margin-bottom:20px;box-shadow:0 8px 24px #0002}h1{margin:0 0 8px;font-size:30px}.info{background:white;border-radius:14px;padding:18px;margin-bottom:18px;box-shadow:0 4px 14px #0001;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.info input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px}.q{background:white;border-radius:14px;padding:18px;margin:16px 0;box-shadow:0 4px 14px #0001;border-left:6px solid #4e4376}.q h3{margin:0 0 10px;font-size:18px}.code{background:#1f2937;color:#f9fafb;padding:14px;border-radius:10px;white-space:pre-wrap;font-family:Consolas,monospace;margin:10px 0}.q input{width:100%;padding:11px;border:1px solid #bbb;border-radius:8px;font-size:15px}.btns{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}button{border:0;border-radius:10px;padding:12px 18px;font-weight:700;cursor:pointer;background:#4e4376;color:white;font-size:15px}button.secondary{background:#2b5876}button.gray{background:#666}.result{display:none;background:white;border-radius:14px;padding:20px;margin-top:16px;box-shadow:0 4px 14px #0001}.explain{display:none;margin-top:12px;padding:12px;border-radius:10px;background:#eef2ff;line-height:1.7}.correct{color:#0a7a2f;font-weight:700}.wrong{color:#c62828;font-weight:700}.score{font-size:24px;font-weight:800;color:#4e4376}.small{font-size:13px;color:#666}footer{text-align:center;color:#777;padding:20px}@media(max-width:760px){.info{grid-template-columns:1fr}.wrap{padding:12px}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>리스트 슬라이싱 단답형 20문항</h1>
<p>각 코드의 출력 결과를 정확히 입력하세요. 리스트 출력은 <b>[ ]</b>, 문자열은 따옴표 없이 입력해도 정답 처리됩니다.</p>
</header>

<section class="info">
<label>학번<input id="sid" placeholder="예: 1101"></label>
<label>이름<input id="name" placeholder="예: 홍길동"></label>
<label>유형<input id="type" value="리스트슬라이싱"></label>
</section>

<form id="quiz"></form>

<div class="btns">
<button type="button" onclick="grade()">채점하기</button>
<button type="button" class="secondary" onclick="showAll()">정답/풀이 보기</button>
<button type="button" class="gray" onclick="saveTxt()">TXT 저장</button>
</div>

<section id="result" class="result"></section>
<footer>Python List Slicing Short Answer Quiz</footer>
</div>

<script>
const questions = [
{code:`a = [10, 20, 30, 40, 50]\nprint(a[1:4])`, ans:`[20, 30, 40]`, exp:`a[1:4]는 인덱스 1부터 3까지 가져오므로 [20, 30, 40]입니다.`},
{code:`a = ['A', 'B', 'C', 'D', 'E']\nprint(a[:3])`, ans:`['A', 'B', 'C']`, exp:`시작을 생략하면 처음부터 인덱스 2까지 가져옵니다.`},
{code:`a = [1, 2, 3, 4, 5, 6]\nprint(a[3:])`, ans:`[4, 5, 6]`, exp:`a[3:]는 인덱스 3부터 끝까지 가져옵니다.`},
{code:`a = [5, 10, 15, 20, 25]\nprint(a[-3:])`, ans:`[15, 20, 25]`, exp:`-3은 뒤에서 세 번째 위치입니다. 그곳부터 끝까지 가져옵니다.`},
{code:`a = [5, 10, 15, 20, 25]\nprint(a[:-2])`, ans:`[5, 10, 15]`, exp:`끝 인덱스 -2는 포함하지 않으므로 앞의 세 값만 출력됩니다.`},
{code:`a = [0, 1, 2, 3, 4, 5, 6]\nprint(a[::2])`, ans:`[0, 2, 4, 6]`, exp:`간격 2로 처음부터 끝까지 건너뛰며 가져옵니다.`},
{code:`a = [0, 1, 2, 3, 4, 5, 6]\nprint(a[1::2])`, ans:`[1, 3, 5]`, exp:`인덱스 1부터 시작하여 2칸씩 이동합니다.`},
{code:`a = ['봄', '여름', '가을', '겨울']\nprint(a[::-1])`, ans:`['겨울', '가을', '여름', '봄']`, exp:`[::-1]은 리스트를 거꾸로 뒤집습니다.`},
{code:`a = [10, 20, 30, 40, 50, 60]\nprint(a[4:1:-1])`, ans:`[50, 40, 30]`, exp:`인덱스 4에서 시작해 인덱스 2까지 거꾸로 가져옵니다. 끝 인덱스 1은 포함하지 않습니다.`},
{code:`a = [1, 2, 3, 4, 5]\nprint(a[-1])`, ans:`5`, exp:`-1은 리스트의 마지막 요소입니다.`},
{code:`a = [1, 2, 3, 4, 5]\nprint(a[-4:-1])`, ans:`[2, 3, 4]`, exp:`-4는 2, -1은 5 위치입니다. 끝은 포함하지 않아 [2, 3, 4]입니다.`},
{code:`a = ['p', 'y', 't', 'h', 'o', 'n']\nprint(a[2:5])`, ans:`['t', 'h', 'o']`, exp:`인덱스 2부터 4까지 가져옵니다.`},
{code:`a = ['p', 'y', 't', 'h', 'o', 'n']\nprint(a[::3])`, ans:`['p', 'h']`, exp:`인덱스 0, 3의 값이 출력됩니다.`},
{code:`a = [100, 200, 300, 400]\nprint(a[:])`, ans:`[100, 200, 300, 400]`, exp:`[:]는 리스트 전체를 복사해서 출력합니다.`},
{code:`a = [3, 6, 9, 12, 15, 18]\nprint(a[2:2])`, ans:`[]`, exp:`시작과 끝 인덱스가 같으면 빈 리스트가 됩니다.`},
{code:`a = [3, 6, 9, 12, 15, 18]\nprint(a[5:1:-2])`, ans:`[18, 12]`, exp:`인덱스 5에서 시작하여 -2 간격으로 5, 3 위치를 가져옵니다. 끝 인덱스 1은 포함하지 않습니다.`},
{code:`a = ['red', 'green', 'blue', 'yellow']\nprint(a[1][0:3])`, ans:`gre`, exp:`a[1]은 'green'이고, [0:3]은 'gre'입니다.`},
{code:`a = [[1,2], [3,4], [5,6], [7,8]]\nprint(a[1:3])`, ans:`[[3, 4], [5, 6]]`, exp:`중첩 리스트에서도 슬라이싱은 요소 단위로 작동합니다.`},
{code:`a = [1, 2, 3, 4, 5]\na[1:4] = [20, 30]\nprint(a)`, ans:`[1, 20, 30, 5]`, exp:`인덱스 1부터 3까지의 요소 [2,3,4]가 [20,30]으로 바뀝니다.`},
{code:`a = [1, 2, 3, 4, 5]\ndel a[::2]\nprint(a)`, ans:`[2, 4]`, exp:`a[::2]는 [1,3,5]입니다. 이 요소들을 삭제하면 [2,4]만 남습니다.`}
];

const quiz = document.getElementById('quiz');
questions.forEach((q,i)=>{
  const div=document.createElement('div'); div.className='q';
  div.innerHTML=`<h3>문제 ${i+1}</h3><div class="code">${q.code}</div><input id="a${i}" placeholder="출력 결과 입력"><div id="e${i}" class="explain"></div>`;
  quiz.appendChild(div);
});

function norm(s){
  return String(s).trim().replace(/\s+/g,'').replace(/"/g,"'");
}
function grade(){
  let score=0, html='<div class="score">채점 결과</div><br>';
  questions.forEach((q,i)=>{
    const user=document.getElementById('a'+i).value;
    const ok=norm(user)===norm(q.ans);
    if(ok) score++;
    html += `<p><b>${i+1}번</b> ${ok?'<span class="correct">정답</span>':'<span class="wrong">오답</span>'} | 입력: ${user||'(미입력)'} | 정답: ${q.ans}</p>`;
    const ex=document.getElementById('e'+i);
    ex.style.display='block';
    ex.innerHTML=`<b>정답:</b> ${q.ans}<br><b>풀이:</b> ${q.exp}`;
  });
  html = `<div class="score">점수: ${score} / ${questions.length}</div><p class="small">정답률: ${Math.round(score/questions.length*100)}%</p>` + html;
  const r=document.getElementById('result'); r.style.display='block'; r.innerHTML=html;
}
function showAll(){
  questions.forEach((q,i)=>{
    const ex=document.getElementById('e'+i);
    ex.style.display='block';
    ex.innerHTML=`<b>정답:</b> ${q.ans}<br><b>풀이:</b> ${q.exp}`;
  });
}
function saveTxt(){
  let score=0;
  let sid=document.getElementById('sid').value.trim()||'학번없음';
  let name=document.getElementById('name').value.trim()||'이름없음';
  let type=document.getElementById('type').value.trim()||'리스트슬라이싱';
  let now=new Date();
  let stamp=now.toISOString().replace(/[:.]/g,'-');
  let lines=[];
  lines.push(`학번: ${sid}`); lines.push(`이름: ${name}`); lines.push(`유형: ${type}`); lines.push(`응시시각: ${now.toLocaleString()}`); lines.push('');
  questions.forEach((q,i)=>{
    const user=document.getElementById('a'+i).value.trim();
    const ok=norm(user)===norm(q.ans); if(ok) score++;
    lines.push(`[${i+1}번] ${ok?'정답':'오답'}`);
    lines.push(q.code);
    lines.push(`입력: ${user||'(미입력)'}`);
    lines.push(`정답: ${q.ans}`);
    lines.push(`풀이: ${q.exp}`);
    lines.push('');
  });
  lines.splice(4,0,`점수: ${score}/${questions.length}`);
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${sid}_${name}_${score}점_리스트슬라이싱_${stamp}.txt`;
  a.click();
}
</script>
</body>
</html>
