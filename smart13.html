<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 퀴즈 - 파일 입출력</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; padding: 20px; margin: 0; background-color: #f0f2f5; }
        h1, h2 { border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        #quizContainer { max-width: 800px; margin: 20px auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .info-group, .question-container { margin-bottom: 25px; }
        label { font-weight: bold; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; font-family: Consolas, "Courier New", monospace; white-space: pre-wrap; background-color: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #e9ecef; }
        .options label { font-weight: normal; margin-right: 15px; display: block; padding: 8px; border-radius: 4px; cursor: pointer; }
        .options label:hover { background-color: #e9ecef; }
        .options input[type="radio"] { margin-right: 10px; }
        button { background-color: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 30px; border-top: 2px solid #dee2e6; padding-top: 20px; }
        .result-item { padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .correct { background-color: #d1e7dd; border-left: 5px solid #198754; }
        .incorrect { background-color: #f8d7da; border-left: 5px solid #dc3545; }
        .explanation { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 4px; }
        code { background-color: #e9ecef; padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="quizContainer">
        <h1>13차시: 파이썬 파일 입출력 퀴즈</h1>

        <form id="quizForm" onsubmit="submitQuiz(event)">
            <h2>인적사항 입력</h2>
            <div class="info-group">
                <label for="school">학교:</label>
                <input type="text" id="school" required>
            </div>
            <div class="info-group">
                <label for="studentId">학번:</label>
                <input type="text" id="studentId" required>
            </div>
            <div class="info-group">
                <label for="name">이름:</label>
                <input type="text" id="name" required>
            </div>

            <hr style="margin: 30px 0;">

            <h2>OX 퀴즈 (10문항)</h2>
            <div id="ox-questions"></div>

            <hr style="margin: 30px 0;">

            <h2>5지선다형 퀴즈 (10문항)</h2>
            <div id="mc-questions"></div>
            
            <button type="submit">채점 및 결과 저장</button>
        </form>

        <div id="results"></div>
    </div>

    <script>

const questions = [
    // O/X Questions (1-10)
    { type: 'ox', text: "<code>open('file.txt', 'w')</code> 코드는 'file.txt' 파일이 존재하지 않으면 새로 생성한다.", answer: 'O', explanation: "'w'(쓰기) 모드와 'a'(추가) 모드는 파일이 존재하지 않을 경우 자동으로 파일을 생성하는 기능이 있습니다." },
    { type: 'ox', text: "파일을 <code>'r'</code>(읽기) 모드로 열 때, 해당 파일이 없으면 빈 파일이 생성된다.", answer: 'X', explanation: "'r'(읽기) 모드는 파일이 반드시 존재해야 합니다. 파일이 없으면 `FileNotFoundError`가 발생합니다." },
    { type: 'ox', text: "<code>'a'</code>(추가) 모드로 파일을 열면 기존 파일의 내용은 삭제되고 새로운 내용으로 덮어써진다.", answer: 'X', explanation: "'a'(append) 모드는 기존 파일 내용의 맨 끝에 새로운 내용을 추가합니다. 기존 내용을 덮어쓰는 모드는 'w'(write) 모드입니다." },
    { type: 'ox', text: "<code>with open(...) as f:</code> 구문을 사용하면 파일을 수동으로 <code>f.close()</code> 해줄 필요가 없다.", answer: 'O', explanation: "`with` 블록은 코드 실행이 끝나거나 오류가 발생하여 블록을 벗어날 때, 파일 객체를 자동으로 안전하게 닫아주는 역할을 합니다." },
    { type: 'ox', text: "<code>f.readline()</code> 메서드는 파일 전체 내용을 하나의 문자열로 읽어온다.", answer: 'X', explanation: "<code>readline()</code>은 파일에서 한 줄만 읽어옵니다. 파일 전체를 하나의 문자열로 읽어오는 메서드는 `f.read()`입니다." },
    { type: 'ox', text: "<code>f.readlines()</code> 메서드는 파일의 모든 줄을 요소로 하는 리스트를 반환한다.", answer: 'O', explanation: "`readlines()`는 파일의 각 줄을 하나의 문자열 요소로 만들어 리스트 형태로 반환하므로, 반복문과 함께 사용하기 편리합니다." },
    { type: 'ox', text: "이미지나 동영상 같은 바이너리 파일을 다룰 때는 <code>'wb'</code>, <code>'rb'</code> 같은 모드를 사용해야 한다.", answer: 'O', explanation: "텍스트가 아닌 파일(바이너리 파일)은 데이터를 바이트 단위로 처리해야 하므로, 모드에 'b'를 추가하여 `rb`(읽기), `wb`(쓰기), `ab`(추가) 등을 사용해야 합니다." },
    { type: 'ox', text: "<code>f.write(123)</code> 처럼 <code>write()</code> 메서드에는 숫자도 직접 인자로 전달할 수 있다.", answer: 'X', explanation: "`write()` 메서드는 오직 문자열(string) 타입의 데이터만 인자로 받습니다. 숫자를 쓰려면 `f.write(str(123))`처럼 문자열로 변환해야 합니다." },
    { type: 'ox', text: "한글이 포함된 파일을 다룰 때는 <code>encoding='utf-8'</code>과 같이 인코딩을 지정하는 것이 안전하다.", answer: 'O', explanation: "운영체제나 환경에 따라 기본 인코딩이 다를 수 있어 한글이 깨지는 원인이 됩니다. `utf-8`과 같이 인코딩을 명시적으로 지정하면 호환성 문제를 예방할 수 있습니다." },
    { type: 'ox', text: "<code>os.path.exists('file.txt')</code>는 'file.txt' 파일이 존재하면 <code>True</code>를 반환한다.", answer: 'O', explanation: "`os` 모듈의 `path.exists()` 함수는 주어진 경로에 파일이나 디렉터리가 실제로 존재하는지 확인하는 유용한 기능입니다." },

    // Multiple Choice Questions (11-20)
    { type: 'mc', text: "다음 중 파일의 내용을 처음부터 다시 쓰면서 기존 내용은 모두 삭제하는 파일 열기 모드는?", options: ["r", "w", "a", "x", "r+"], answer: "w", explanation: "'w'(write) 모드는 파일을 쓰기용으로 열며, 파일이 이미 존재할 경우 내용을 모두 지우고 처음부터 다시 씁니다." },
    { type: 'mc', text: "코드 <code>with open('data.txt', 'r') as f: lines = f.readlines()</code> 실행 후, 변수 <code>lines</code>의 타입은 무엇인가?", options: ["str", "int", "list", "tuple", "dict"], answer: "list", explanation: "`readlines()` 메서드는 파일의 모든 줄을 읽어, 각 줄을 문자열 요소로 갖는 리스트(list)를 반환합니다." },
    { type: 'mc', text: "파일을 열 때 발생할 수 있는 <code>FileNotFoundError</code>를 처리하기 위한 가장 적절한 구문은?", options: ["if-else", "for", "while", "try-except", "def"], answer: "try-except", explanation: "`try` 블록 안에 파일 열기 코드를 넣고 `except FileNotFoundError:` 블록에서 예외 상황을 처리하는 것이 가장 안정적이고 표준적인 방법입니다." },
    { type: 'mc', text: "리스트 <code>data = ['apple\\n', 'banana\\n']</code>를 파일에 쓰려고 할 때, 올바른 메서드는?", options: ["f.write(data)", "f.writelines(data)", "f.writeall(data)", "f.print(data)", "f.put(data)"], answer: "f.writelines(data)", explanation: "`writelines()` 메서드는 문자열 리스트를 인자로 받아 파일에 순서대로 씁니다. `write()`는 단일 문자열만 인자로 받습니다." },
    { type: 'mc', text: "파일의 특정 위치로 커서를 이동시킬 때 사용하는 메서드는?", options: ["tell()", "read()", "seek()", "move()", "offset()"], answer: "seek()", explanation: "`seek(offset)` 메서드는 파일의 시작점으로부터 `offset` 바이트만큼 커서를 이동시키는 역할을 합니다. `tell()`은 현재 위치를 알려줍니다." },
    { type: 'mc', text: "다음 파일 열기 모드 중 '읽기'와 '쓰기'가 모두 가능한 모드는?", options: ["r", "w", "a", "r+", "wb"], answer: "r+", explanation: "모드에 '+'를 붙이면 업데이트(읽기+쓰기)가 가능해집니다. 'r+'는 파일을 읽기/쓰기용으로 열고, 'w+'는 쓰기/읽기용으로 열되 기존 내용을 삭제합니다." },
    { type: 'mc', text: "<code>f = open('test.txt', 'w')</code> 이후 <code>f.write('hello')</code>를 실행했습니다. 파일에 내용이 확실히 저장되도록 보장하는 가장 좋은 방법은?", options: ["컴퓨터를 재부팅한다", "아무것도 안 해도 자동으로 저장된다", "f.close()를 호출하거나 with 구문을 사용한다", "f.save()를 호출한다", "f.commit()을 호출한다"], answer: "f.close()를 호출하거나 with 구문을 사용한다", explanation: "파일을 닫을 때 버퍼에 있던 내용이 디스크에 최종적으로 저장됩니다. `f.close()`를 직접 호출하거나, `with` 구문을 사용해 자동으로 닫히도록 하는 것이 가장 안전합니다." },
    { type: 'mc', text: "다음 코드의 실행 결과로 올바른 것은?\n<code>with open('a.txt','w') as f: f.write('123')\nwith open('a.txt','a') as f: f.write('456')</code>", options: ["파일 내용은 '123'이다.", "파일 내용은 '456'이다.", "파일 내용은 '123456'이다.", "파일 내용은 '456123'이다.", "오류가 발생한다."], answer: "파일 내용은 '123456'이다.", explanation: "첫 번째 `with` 구문에서 'w' 모드로 '123'을 씁니다. 두 번째 `with` 구문에서 'a' 모드로 파일을 열어 기존 내용 뒤에 '456'을 추가하므로 최종 결과는 '123456'이 됩니다." },
    { type: 'mc', text: "존재하지 않는 파일을 <code>'w'</code> 모드로 열 때 발생하는 일은?", options: ["FileNotFoundError 발생", "PermissionError 발생", "새로운 빈 파일이 생성됨", "None을 반환함", "프로그램이 멈춤"], answer: "새로운 빈 파일이 생성됨", explanation: "'w'(쓰기) 모드와 'a'(추가) 모드는 대상 파일이 없을 경우, 해당 이름으로 새로운 파일을 생성한 후 작업을 시작합니다." },
    { type: 'mc', text: "<code>encoding</code> 인자의 주된 용도는 무엇인가?", options: ["파일을 암호화하기 위해", "파일을 압축하기 위해", "바이트와 문자열 사이의 변환 규칙을 지정하기 위해", "파일의 읽기/쓰기 속도를 높이기 위해", "파일 소유자를 지정하기 위해"], answer: "바이트와 문자열 사이의 변환 규칙을 지정하기 위해", explanation: "인코딩은 컴퓨터의 0과 1(바이트)을 사람이 읽는 문자로 변환하는 규칙(예: utf-8)을 지정합니다." }
];

        function renderQuestions() {
            const oxContainer = document.getElementById('ox-questions');
            const mcContainer = document.getElementById('mc-questions');
            let questionNumber = 1;

            questions.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container';
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${questionNumber}. ${q.text.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                qDiv.appendChild(qText);
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                if (q.type === 'ox') {
                    ['O', 'X'].forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio'; radio.name = `q${questionNumber}`; radio.value = opt; radio.required = true;
                        label.appendChild(radio); label.append(` ${opt}`);
                        optionsDiv.appendChild(label);
                    });
                } else if (q.type === 'mc') {
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio'; radio.name = `q${questionNumber}`; radio.value = opt; radio.required = true;
                        label.appendChild(radio);
                        label.innerHTML += ` ${opt.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                        optionsDiv.appendChild(label);
                    });
                }
                qDiv.appendChild(optionsDiv);
                if (q.type === 'ox') {
                    oxContainer.appendChild(qDiv);
                } else {
                    mcContainer.appendChild(qDiv);
                }
                questionNumber++;
            });
        }

        function submitQuiz(event) {
            event.preventDefault();
            const school = document.getElementById('school').value;
            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('name').value;
            let score = 0;
            let fileContent = "";
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '<h2>채점 결과</h2>';
            for (let i = 0; i < questions.length; i++) {
                const qNumber = i + 1;
                const selectedOption = document.querySelector(`input[name="q${qNumber}"]:checked`);
                const questionData = questions[i];
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                let resultText = `<strong>[${qNumber}번 문항]</strong>
`;
                if (selectedOption && selectedOption.value === questionData.answer) {
                    score++;
                    resultItem.classList.add('correct');
                    resultText += `<strong>결과: 정답!</strong>`;
                } else {
                    resultItem.classList.add('incorrect');
                    resultText += `<strong>결과: 오답!</strong> (선택: ${selectedOption ? selectedOption.value : '미선택'}, 정답: ${questionData.answer})`;
                }
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.innerHTML = `<strong>상세 풀이:</strong> ${questionData.explanation.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                resultItem.innerHTML = resultText;
                resultItem.appendChild(explanation);
                resultsContainer.appendChild(resultItem);
                
                const plainTextForFile = questionData.text.replace(/<[^>]*>/g, '').replace(/`([^`]+)`/g, '$1');
                fileContent += `[${qNumber}번 문항]\n`;
                fileContent += `문제: ${plainTextForFile}\n`;
                fileContent += `선택한 답: ${selectedOption ? selectedOption.value : '미선택'}\n`;
                fileContent += `정답: ${questionData.answer}\n`;
                fileContent += `결과: ${selectedOption && selectedOption.value === questionData.answer ? '정답' : '오답'}\n`;
                fileContent += `풀이: ${questionData.explanation.replace(/<[^>]*>/g, '').replace(/`([^`]+)`/g, '$1')}\n\n`;
            }
            const totalScore = (score / questions.length) * 100;
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}시${String(now.getMinutes()).padStart(2, '0')}분`;
            const summary = document.createElement('p');
            summary.innerHTML = `<strong>총점: ${totalScore.toFixed(0)}점 (${questions.length}개 중 ${score}개 정답)</strong>`;
            resultsContainer.prepend(summary);
            const fileHeader = `학교: ${school}\n학번: ${studentId}\n이름: ${name}\n응시 시각: ${timestamp}\n총점: ${totalScore.toFixed(0)}점\n\n---\n\n`;
            fileContent = fileHeader + fileContent;
            const fileNameTimestamp = now.toISOString().replace(/:/g, '-').slice(0, 19);
            const fileName = `${school}_${studentId}_${name}_${totalScore.toFixed(0)}점_${fileNameTimestamp}.txt`;
            download(fileName, fileContent);
        }

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
