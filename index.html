<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Smart Files Link List</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .link-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        a { text-decoration: none; color: #007bff; border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 5px; }
        a:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>

    <h2>Smart 파일 목록 (01-18)</h2>
    <div class="link-container" id="linkBox">
        </div>

    <script>
        const container = document.getElementById('linkBox');
        for (let i = 1; i <= 18; i++) {
            // 숫자를 두 자리 문자열로 변환 (예: 1 -> 01)
            let num = i.toString().padStart(2, '0');
            let fileName = `smart${num}.html`;
            
            let anchor = document.createElement('a');
            anchor.href = fileName;
            anchor.target = "_blank"; // 새 탭에서 열기
            anchor.innerText = fileName;
            
            container.appendChild(anchor);
        }
    </script>

</body>
</html>
