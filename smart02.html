<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 퀴즈 - 변수와 자료형</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; padding: 20px; margin: 0; background-color: #f0f2f5; }
        h1, h2 { border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        #quizContainer { max-width: 800px; margin: 20px auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .info-group, .question-container { margin-bottom: 25px; }
        label { font-weight: bold; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; font-family: Consolas, "Courier New", monospace; white-space: pre-wrap; background-color: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #e9ecef; }
        .options label { font-weight: normal; margin-right: 15px; display: block; padding: 8px; border-radius: 4px; cursor: pointer; }
        .options label:hover { background-color: #e9ecef; }
        .options input[type="radio"] { margin-right: 10px; }
        button { background-color: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 30px; border-top: 2px solid #dee2e6; padding-top: 20px; }
        .result-item { padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .correct { background-color: #d1e7dd; border-left: 5px solid #198754; }
        .incorrect { background-color: #f8d7da; border-left: 5px solid #dc3545; }
        .explanation { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="quizContainer">
        <h1>2차시: 파이썬 변수와 자료형 퀴즈</h1>

        <form id="quizForm" onsubmit="submitQuiz(event)">
            <h2>인적사항 입력</h2>
            <div class="info-group">
                <label for="school">학교:</label>
                <input type="text" id="school" required>
            </div>
            <div class="info-group">
                <label for="studentId">학번:</label>
                <input type="text" id="studentId" required>
            </div>
            <div class="info-group">
                <label for="name">이름:</label>
                <input type="text" id="name" required>
            </div>

            <hr style="margin: 30px 0;">

            <h2>OX 퀴즈 (10문항)</h2>
            <div id="ox-questions"></div>

            <hr style="margin: 30px 0;">

            <h2>5지선다형 퀴즈 (10문항)</h2>
            <div id="mc-questions"></div>
            
            <button type="submit">채점 및 결과 저장</button>
        </form>

        <div id="results"></div>
    </div>

    <script>
        const questions = [
            // OX 퀴즈 (1-10)
            { type: 'ox', text: '파이썬 변수명은 숫자로 시작할 수 있다. (예: `1st_place = "인수샘"`)', answer: 'X', explanation: '파이썬 변수명은 영문자 또는 밑줄(_)로 시작해야 합니다. 숫자는 두 번째 글자부터 사용할 수 있습니다.' },
            { type: 'ox', text: '`x = 5.0` 코드는 변수 `x`를 정수(integer)형으로 만든다.', answer: 'X', explanation: '소수점이 포함된 숫자는 실수(float)형으로 취급됩니다. `x=5`가 정수형입니다.' },
            { type: 'ox', text: '`"Hello" + "World"` 코드의 실행 결과는 `"HelloWorld"` 이다.', answer: 'O', explanation: '문자열에 `+` 연산자를 사용하면 두 문자열을 이어 붙일 수 있습니다(Concatenation).' },
            { type: 'ox', text: '리스트(List)는 mutable(변경 가능)하므로, 생성 후에도 원소의 값을 바꾸거나 추가할 수 있다.', answer: 'O', explanation: '리스트는 `my_list[0] = 10`과 같이 원소를 수정하거나, `my_list.append(20)`과 같이 원소를 추가할 수 있는 변경 가능한 자료형입니다.' },
            { type: 'ox', text: '튜플(Tuple) 자료형은 대괄호 `[]`를 사용하여 정의한다.', answer: 'X', explanation: '튜플은 소괄호 `()`를 사용하여 정의합니다. (예: `my_tuple = (1, 2, 3)`). 대괄호 `[]`는 리스트를 정의할 때 사용됩니다.' },
            { type: 'ox', text: '`type()` 함수는 변수가 어떤 자료형인지 확인하는 데 사용된다.', answer: 'O', explanation: '`print(type(10))`은 `<class \'int\'>`를 출력하여 해당 변수의 자료형 정보를 알려줍니다.' },
            { type: 'ox', text: '`int("123")` 코드는 문자열을 정수로 변환하며 정상적으로 실행된다.', answer: 'O', explanation: '숫자 형태의 문자열은 `int()` 함수를 통해 정수형으로, `float()` 함수를 통해 실수형으로 변환(Type Casting)할 수 있습니다.' },
            { type: 'ox', text: '파이썬은 변수 선언 시 `int num = 10;` 처럼 자료형을 반드시 명시해야 하는 정적 타입 언어이다.', answer: 'X', explanation: '파이썬은 변수에 값이 할당될 때 자료형이 결정되는 동적 타입(Dynamically Typed) 언어입니다. `num = 10`과 같이 선언합니다.' },
            { type: 'ox', text: '불리언(boolean) 변수는 `True`, `False`, `None` 세 가지 값 중 하나를 가질 수 있다.', answer: 'X', explanation: '불리언 변수는 오직 `True`(참)와 `False`(거짓) 두 가지 값만 가질 수 있습니다. `None`은 값이 없음을 의미하는 별도의 자료형입니다.' },
            { type: 'ox', text: '`a, b = 10, 20`와 같이 한 줄에 여러 변수를 동시에 할당하는 것이 가능하다.', answer: 'O', explanation: '이는 튜플 패킹/언패킹의 일종으로, 파이썬에서 지원하는 편리한 다중 할당 문법입니다.' },

            // 5지선다형 퀴즈 (11-20)
            { type: 'mc', text: '다음 중 파이썬의 표준 내장 자료형이 **아닌** 것은?', options: ['int', 'list', 'dict', 'character', 'tuple'], answer: 'character', explanation: '파이썬에는 C언어의 `char`와 같은 별도의 문자(character) 자료형이 없습니다. 한 글자도 길이가 1인 문자열(string)로 취급합니다.' },
            { type: 'mc', text: '`7 / 2` 코드의 실행 결과는?', options: ['3', '3.5', '3.0', '4', '오류 발생'], answer: '3.5', explanation: '파이썬 3.x 버전부터 `/` 연산자는 항상 실수(float) 결과를 반환하는 나눗셈을 수행합니다.' },
            { type: 'mc', text: '나눗셈의 몫만 정수로 구하고자 할 때 사용하는 연산자는?', options: ['/', '%', '//', '**', '&'], answer: '//', explanation: '`//`는 "정수 나눗셈(Floor Division)" 연산자로, 나눗셈 결과에서 소수점 이하를 버리고 정수 부분(몫)만 반환합니다. `7 // 2`의 결과는 3입니다.' },
            { type: 'mc', text: '값의 변경이 불가능한(immutable) 자료형으로만 묶인 것은?', options: ['리스트, 튜플', '문자열, 집합', '정수, 문자열, 튜플', '딕셔너리, 리스트', '튜플, 딕셔너리'], answer: '정수, 문자열, 튜플', explanation: '리스트(list), 딕셔너리(dict), 집합(set)은 변경 가능한(mutable) 자료형입니다. 정수(int), 실수(float), 문자열(str), 튜플(tuple) 등은 변경 불가능합니다.' },
            { type: 'mc', text: '`my_list = ["a", "b", "c", "d"]`가 있을 때, `"b"`를 출력하기 위한 올바른 코드는?', options: ['`my_list(1)`', '`my_list[0]`', '`my_list[1]`', '`my_list.get(1)`', '`my_list.b`'], answer: '`my_list[1]`', explanation: '파이썬의 리스트 인덱스는 0부터 시작합니다. 따라서 두 번째 요소인 "b"에 접근하려면 인덱스 1을 사용해야 합니다.' },
            { type: 'mc', text: '다음 중 중복된 요소를 허용하지 않는 순서 없는 컬렉션 자료형은?', options: ['리스트(list)', '튜플(tuple)', '딕셔너리(dict)', '집합(set)', '문자열(str)'], answer: '집합(set)', explanation: '집합(set)은 고유한 값들의 모음으로, 수학의 집합처럼 중복을 허용하지 않으며 순서가 보장되지 않는 특징이 있습니다.' },
            { type: 'mc', text: '`print(type(1j))` 코드의 실행 결과에 포함될 자료형의 이름은?', options: ['int', 'float', 'complex', 'imaginary', 'number'], answer: 'complex', explanation: '파이썬에서는 `j`를 사용하여 허수부를 표현하며, 이는 복소수(complex) 자료형으로 처리됩니다.' },
            { type: 'mc', text: '다음 중 `False`로 평가되는 값이 **아닌** 것은?', options: ['0', 'None', '"" (빈 문자열)', '[] (빈 리스트)', '"False" (문자열)'], answer: '"False" (문자열)', explanation: '파이썬에서 `0`, `None`, 빈 컬렉션(문자열, 리스트, 튜플, 딕셔너리 등)은 `False`로 취급됩니다. 하지만 내용이 있는 문자열(비록 그 내용이 "False"일지라도)은 `True`로 평가됩니다.' },
            { type: 'mc', text: '키(Key)와 값(Value)의 쌍으로 데이터를 저장하는 자료형은?', options: ['리스트(list)', '튜플(tuple)', '딕셔너리(dict)', '집합(set)', '배열(array)'], answer: '딕셔너리(dict)', explanation: '딕셔너리는 `{key: value}` 형태로 데이터를 저장하며, 특정 키를 통해 값을 빠르게 찾아올 수 있는 구조입니다.' },
            { type: 'mc', text: '`a = 10` 과 `b = "10"` 이 있을 때, `a == b` 의 결과는?', options: ['True', 'False', '10', '오류 발생', 'None'], answer: 'False', explanation: '`==` 연산자는 두 피연산자의 \'값\'을 비교합니다. 하지만 이 경우 정수 `10`과 문자열 `"10"`은 자료형이 다르므로 다른 값으로 취급되어 `False`를 반환합니다.' }
        ];

        function renderQuestions() {
            const oxContainer = document.getElementById('ox-questions');
            const mcContainer = document.getElementById('mc-questions');
            let questionNumber = 1;

            questions.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container';
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${questionNumber}. ${q.text}`;
                qDiv.appendChild(qText);
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                if (q.type === 'ox') {
                    ['O', 'X'].forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = `q${questionNumber}`;
                        radio.value = opt;
                        radio.required = true;
                        label.appendChild(radio);
                        label.append(` ${opt}`);
                        optionsDiv.appendChild(label);
                    });
                } else if (q.type === 'mc') {
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = `q${questionNumber}`;
                        radio.value = opt;
                        radio.required = true;
                        label.appendChild(radio);
                        label.append(` ${opt}`);
                        optionsDiv.appendChild(label);
                    });
                }
                qDiv.appendChild(optionsDiv);
                if (q.type === 'ox') {
                    oxContainer.appendChild(qDiv);
                } else {
                    mcContainer.appendChild(qDiv);
                }
                questionNumber++;
            });
        }

        function submitQuiz(event) {
            event.preventDefault();
            const school = document.getElementById('school').value;
            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('name').value;
            let score = 0;
            let fileContent = "";
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '<h2>채점 결과</h2>';
            for (let i = 0; i < questions.length; i++) {
                const qNumber = i + 1;
                const selectedOption = document.querySelector(`input[name="q${qNumber}"]:checked`);
                const questionData = questions[i];
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                let resultText = `<strong>[${qNumber}번 문항]</strong>
`;
                if (selectedOption && selectedOption.value === questionData.answer) {
                    score++;
                    resultItem.classList.add('correct');
                    resultText += `<strong>결과: 정답!</strong>`;
                } else {
                    resultItem.classList.add('incorrect');
                    resultText += `<strong>결과: 오답!</strong> (선택: ${selectedOption ? selectedOption.value : '미선택'}, 정답: ${questionData.answer})`;
                }
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.innerHTML = `<strong>상세 풀이:</strong> ${questionData.explanation}`;
                resultItem.innerHTML = resultText;
                resultItem.appendChild(explanation);
                resultsContainer.appendChild(resultItem);
                fileContent += `[${qNumber}번 문항]\n`;
                fileContent += `문제: ${questionData.text}\n`;
                fileContent += `선택한 답: ${selectedOption ? selectedOption.value : '미선택'}\n`;
                fileContent += `정답: ${questionData.answer}\n`;
                fileContent += `결과: ${selectedOption && selectedOption.value === questionData.answer ? '정답' : '오답'}\n`;
                fileContent += `풀이: ${questionData.explanation}\n\n`;
            }
            const totalScore = (score / questions.length) * 100;
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}시${String(now.getMinutes()).padStart(2, '0')}분`;
            const summary = document.createElement('p');
            summary.innerHTML = `<strong>총점: ${totalScore.toFixed(0)}점 (${questions.length}개 중 ${score}개 정답)</strong>`;
            resultsContainer.prepend(summary);
            const fileHeader = `학교: ${school}\n학번: ${studentId}\n이름: ${name}\n응시 시각: ${timestamp}\n총점: ${totalScore.toFixed(0)}점\n\n---\n\n`;
            fileContent = fileHeader + fileContent;
            const fileNameTimestamp = now.toISOString().replace(/:/g, '-').slice(0, 19);
            const fileName = `${school}_${studentId}_${name}_${totalScore.toFixed(0)}점_${fileNameTimestamp}.txt`;
            download(fileName, fileContent);
        }

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
