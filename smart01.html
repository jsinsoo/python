<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파이썬 퀴즈 - 파이썬 입문</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.6; padding: 20px; margin: 0; background-color: #f0f2f5; }
        h1, h2 { border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        #quizContainer { max-width: 800px; margin: 20px auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .info-group, .question-container { margin-bottom: 25px; }
        label { font-weight: bold; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; font-family: Consolas, "Courier New", monospace; white-space: pre-wrap; background-color: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #e9ecef; }
        .options label { font-weight: normal; margin-right: 15px; display: block; padding: 8px; border-radius: 4px; cursor: pointer; }
        .options label:hover { background-color: #e9ecef; }
        .options input[type="radio"] { margin-right: 10px; }
        button { background-color: #007bff; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%; }
        button:hover { background-color: #0056b3; }
        #results { margin-top: 30px; border-top: 2px solid #dee2e6; padding-top: 20px; }
        .result-item { padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .correct { background-color: #d1e7dd; border-left: 5px solid #198754; }
        .incorrect { background-color: #f8d7da; border-left: 5px solid #dc3545; }
        .explanation { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 4px; }
        code { background-color: #e9ecef; padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="quizContainer">
        <h1>1차시: 파이썬 입문 퀴즈</h1>

        <form id="quizForm" onsubmit="submitQuiz(event)">
            <h2>인적사항 입력</h2>
            <div class="info-group">
                <label for="school">학교:</label>
                <input type="text" id="school" required>
            </div>
            <div class="info-group">
                <label for="studentId">학번:</label>
                <input type="text" id="studentId" required>
            </div>
            <div class="info-group">
                <label for="name">이름:</label>
                <input type="text" id="name" required>
            </div>

            <hr style="margin: 30px 0;">

            <h2>OX 퀴즈 (10문항)</h2>
            <div id="ox-questions"></div>

            <hr style="margin: 30px 0;">

            <h2>5지선다형 퀴즈 (10문항)</h2>
            <div id="mc-questions"></div>
            
            <button type="submit">채점 및 결과 저장</button>
        </form>

        <div id="results"></div>
    </div>

    <script>

   const questions = [
            // OX 퀴즈 (1-10)
            { type: 'ox', text: '파이썬에서 변수를 선언할 때 `int a = 10;`과 같이 자료형을 명시해야 한다.', answer: 'X', explanation: '파이썬은 동적 타이핑 언어로, 변수에 값을 할당할 때 자료형을 명시하지 않아도 자동으로 결정됩니다. `a = 10`과 같이 사용합니다.' },
            { type: 'ox', text: '`print()` 함수는 문자열, 숫자, 변수 등 다양한 값을 화면에 출력할 수 있다.', answer: 'O', explanation: '`print()`는 파이썬의 내장 함수로, 인자로 전달된 다양한 타입의 데이터를 콘솔에 출력하는 역할을 합니다.' },
            { type: 'ox', text: '파이썬의 주석은 `#` 기호로 시작하며, `#`가 있는 줄 전체는 코드 실행에 영향을 주지 않는다.', answer: 'O', explanation: '한 줄 주석은 `#`으로 시작합니다. 여러 줄 주석은 `"""` 또는 `\'\'\'`로 묶어서 표현할 수 있습니다.' },
            { type: 'ox', text: '리스트(List)와 튜플(Tuple)의 가장 큰 차이점은 값의 변경 가능 여부이다. 리스트는 변경 가능하고, 튜플은 변경 불가능하다.', answer: 'O', explanation: '리스트(List)는 mutable(변경 가능)하고, 튜플(Tuple)은 immutable(변경 불가능)합니다. 이 특성 때문에 튜플은 딕셔너리의 키로 사용될 수 있습니다.' },
            { type: 'ox', text: '`for i in range(3):` 코드는 `i`가 1, 2, 3으로 변하면서 3번 반복된다.', answer: 'X', explanation: '`range(3)`은 0부터 시작하여 3 직전까지의 숫자를 생성합니다. 따라서 `i`는 0, 1, 2로 변하면서 3번 반복됩니다.' },
            { type: 'ox', text: '파이썬은 들여쓰기(indentation)를 사용하여 코드 블록을 구분하므로, 들여쓰기는 매우 중요하다.', answer: 'O', explanation: '다른 언어들이 중괄호(`{}`)를 사용하는 것과 달리, 파이썬은 동일한 단계의 들여쓰기를 통해 코드의 종속 관계를 나타냅니다.' },
            { type: 'ox', text: '`"apple" + 3` 코드는 "apple3"이라는 문자열을 성공적으로 만들어낸다.', answer: 'X', explanation: '파이썬에서는 문자열과 숫자를 `+` 연산자로 직접 결합할 수 없습니다. `TypeError`가 발생합니다. `str(3)`으로 숫자를 문자열로 변환한 후 결합해야 합니다.' },
            { type: 'ox', text: '딕셔너리(Dictionary)는 순서가 없는 키(Key)와 값(Value)의 쌍으로 이루어진 자료구조이다.', answer: 'O', explanation: '딕셔너리는 중괄호 `{}`를 사용하여 `{key: value}` 형태로 데이터를 저장합니다. (참고: Python 3.7+ 부터는 입력 순서가 유지됩니다.)' },
            { type: 'ox', text: '파일을 열 때 `with open(...) as f:` 구문을 사용하면 파일을 수동으로 `f.close()` 해주어야 한다.', answer: 'X', explanation: '`with` 구문을 사용하면 `with` 블록을 벗어날 때 파이썬이 자동으로 파일을 닫아주므로 `close()`를 명시적으로 호출할 필요가 없습니다.' },
            { type: 'ox', text: '`import math`를 통해 `math` 모듈을 가져온 후, 원주율은 `math.PI`로 접근할 수 있다.', answer: 'X', explanation: '`math` 모듈에서 원주율은 `math.pi` (소문자)로 제공됩니다. 파이썬은 대소문자를 구분합니다.' },

            // 5지선다형 퀴즈 (11-20)
            { type: 'mc', text: '다음 중 파이썬의 변수명으로 사용할 수 **없는** 것은?', options: ['my_variable', '_var', 'Var2', '2nd_var', 'var_'], answer: '2nd_var', explanation: '파이썬 변수명은 숫자로 시작할 수 없습니다. 영문자, 숫자, 밑줄(_)로 구성될 수 있으며, 영문자 또는 밑줄로 시작해야 합니다.' },
            { type: 'mc', text: '`my_list = [10, 20, 30, 40, 50]`이 있을 때, `my_list[1:3]`의 결과는?', options: ['[20, 30, 40]', '[10, 20]', '[20, 30]', '[10, 20, 30]', '[30, 40]'], answer: '[20, 30]', explanation: '리스트 슬라이싱에서 `[start:end]`는 `start` 인덱스부터 `end-1` 인덱스까지의 요소를 포함합니다. 따라서 `my_list[1]`과 `my_list[2]`인 `[20, 30]`이 반환됩니다.' },
            { type: 'mc', text: '파이썬에서 "값의 변경이 불가능한(immutable)" 자료형이 **아닌** 것은?', options: ['정수 (int)', '튜플 (tuple)', '문자열 (str)', '리스트 (list)', '불리언 (bool)'], answer: '리스트 (list)', explanation: '리스트는 요소를 추가, 삭제, 변경할 수 있는 "변경 가능한(mutable)" 자료형입니다. 정수, 튜플, 문자열 등은 한 번 생성되면 그 값을 바꿀 수 없습니다.' },
            { type: 'mc', text: '다음 중 집합(set) 자료형의 특징으로 **틀린** 것은?', options: ['중복된 값을 허용하지 않는다.', '순서가 없다.', '중괄호 `{}`를 사용하여 생성한다.', '인덱싱을 통해 요소에 접근할 수 있다.', '합집합, 교집합 등의 연산이 가능하다.'], answer: '인덱싱을 통해 요소에 접근할 수 있다.', explanation: '집합(set)은 순서가 없기 때문에 `my_set[0]`과 같은 인덱싱을 지원하지 않습니다. 요소의 존재 여부는 `in` 키워드로 확인할 수 있습니다.' },
            { type: 'mc', text: '함수 정의 시, 정해지지 않은 개수의 인자들을 한 번에 받기 위해 사용하는 문법은?', options: ['`*args`', '`&kwargs`', '`...params`', '`@others`', '`#inputs`'], answer: '`*args`', explanation: '`*args`는 여러 개의 위치 인자를 튜플 형태로 받습니다. 키워드 인자를 여러 개 받기 위해서는 `**kwargs`를 사용하며, 이는 딕셔너리 형태로 전달됩니다.' },
            { type: 'mc', text: '다음 코드의 실행 결과는?\n`a = {1, 2, 3, 3, 4}`\n`b = {3, 4, 5, 6}`\n`print(a | b)`', options: ['`{1, 2, 3, 4, 5, 6}`', '`{3, 4}`', '`{1, 2, 3, 3, 4, 3, 4, 5, 6}`', '`{1, 2, 5, 6}`', '오류 발생'], answer: '`{1, 2, 3, 4, 5, 6}`', explanation: '집합(set)에서 `|` 연산자는 두 집합의 합집합(union)을 구합니다. 집합은 중복을 허용하지 않으므로 `a`는 `{1, 2, 3, 4}`가 되고, `b`와의 합집합은 `{1, 2, 3, 4, 5, 6}`이 됩니다.' },
            { type: 'mc', text: '`try...except...else...finally` 구문에서, `except` 블록이 실행되지 않았을 때 **반드시** 실행되는 블록은?', options: ['try', 'else', 'finally', '모두 실행 안 됨', 'try와 finally'], answer: 'else', explanation: '`try` 블록에서 예외가 발생하지 않으면 `else` 블록이 실행됩니다. `finally` 블록은 예외 발생 여부와 상관없이 항상 마지막에 실행됩니다.' },
            { type: 'mc', text: '리스트의 모든 요소를 제곱하기 위한 가장 "파이썬스러운(Pythonic)" 방법은?', options: ['`for` 루프 사용', '`while` 루프 사용', '리스트 컴프리헨션 사용', '`map`과 `lambda` 사용', '재귀 함수 사용'], answer: '리스트 컴프리헨션 사용', explanation: '`[x**2 for x in my_list]`와 같은 리스트 컴프리헨션은 간결하고 가독성이 높아 파이썬에서 널리 권장되는 방법입니다. `map`과 `lambda`도 좋은 방법이지만, 컴프리헨션이 더 직관적일 때가 많습니다.' },
            { type: 'mc', text: '객체 지향 프로그래밍에서, 부모 클래스의 속성이나 메소드를 자식 클래스가 물려받는 특성을 무엇이라고 하는가?', options: ['캡슐화(Encapsulation)', '상속(Inheritance)', '다형성(Polymorphism)', '추상화(Abstraction)', '오버로딩(Overloading)'], answer: '상속(Inheritance)', explanation: '상속은 코드의 재사용성을 높이고 클래스 간의 관계를 설정하는 객체 지향의 핵심 개념 중 하나입니다.' },
            { type: 'mc', text: '다음 중 파일 열기(open) 모드에 대한 설명이 **잘못된** 것은?', options: ['`r`: 읽기 모드 (기본값)', '`w`: 쓰기 모드 (파일이 있으면 덮어씀)', '`a`: 추가 모드 (파일 끝에 내용을 추가)', '`x`: 생성 모드 (파일이 있으면 오류 발생)', '`r+`: 읽기 및 추가 모드'], answer: '`r+`: 읽기 및 추가 모드', explanation: '`r+`는 읽기 및 쓰기 모드입니다. 파일의 처음부터 데이터를 덮어쓸 수 있습니다. 추가(append)와는 다릅니다. 추가 모드는 `a+` 입니다.' },
        ];


        function renderQuestions() {
            const oxContainer = document.getElementById('ox-questions');
            const mcContainer = document.getElementById('mc-questions');
            let questionNumber = 1;

            questions.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container';
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${questionNumber}. ${q.text.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                qDiv.appendChild(qText);
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                if (q.type === 'ox') {
                    ['O', 'X'].forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio'; radio.name = `q${questionNumber}`; radio.value = opt; radio.required = true;
                        label.appendChild(radio); label.append(` ${opt}`);
                        optionsDiv.appendChild(label);
                    });
                } else if (q.type === 'mc') {
                    q.options.forEach(opt => {
                        const label = document.createElement('label');
                        const radio = document.createElement('input');
                        radio.type = 'radio'; radio.name = `q${questionNumber}`; radio.value = opt; radio.required = true;
                        label.appendChild(radio);
                        label.innerHTML += ` ${opt.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                        optionsDiv.appendChild(label);
                    });
                }
                qDiv.appendChild(optionsDiv);
                if (q.type === 'ox') {
                    oxContainer.appendChild(qDiv);
                } else {
                    mcContainer.appendChild(qDiv);
                }
                questionNumber++;
            });
        }

        function submitQuiz(event) {
            event.preventDefault();
            const school = document.getElementById('school').value;
            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('name').value;
            let score = 0;
            let fileContent = "";
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '<h2>채점 결과</h2>';
            for (let i = 0; i < questions.length; i++) {
                const qNumber = i + 1;
                const selectedOption = document.querySelector(`input[name="q${qNumber}"]:checked`);
                const questionData = questions[i];
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                let resultText = `<strong>[${qNumber}번 문항]</strong>
`;
                if (selectedOption && selectedOption.value === questionData.answer) {
                    score++;
                    resultItem.classList.add('correct');
                    resultText += `<strong>결과: 정답!</strong>`;
                } else {
                    resultItem.classList.add('incorrect');
                    resultText += `<strong>결과: 오답!</strong> (선택: ${selectedOption ? selectedOption.value : '미선택'}, 정답: ${questionData.answer})`;
                }
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.innerHTML = `<strong>상세 풀이:</strong> ${questionData.explanation.replace(/`([^`]+)`/g, '<code>$1</code>')}`;
                resultItem.innerHTML = resultText;
                resultItem.appendChild(explanation);
                resultsContainer.appendChild(resultItem);
                
                const plainTextForFile = questionData.text.replace(/<[^>]*>/g, '').replace(/`([^`]+)`/g, '$1');
                fileContent += `[${qNumber}번 문항]\n`;
                fileContent += `문제: ${plainTextForFile}\n`;
                fileContent += `선택한 답: ${selectedOption ? selectedOption.value : '미선택'}\n`;
                fileContent += `정답: ${questionData.answer}\n`;
                fileContent += `결과: ${selectedOption && selectedOption.value === questionData.answer ? '정답' : '오답'}\n`;
                fileContent += `풀이: ${questionData.explanation.replace(/<[^>]*>/g, '').replace(/`([^`]+)`/g, '$1')}\n\n`;
            }
            const totalScore = (score / questions.length) * 100;
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}시${String(now.getMinutes()).padStart(2, '0')}분`;
            const summary = document.createElement('p');
            summary.innerHTML = `<strong>총점: ${totalScore.toFixed(0)}점 (${questions.length}개 중 ${score}개 정답)</strong>`;
            resultsContainer.prepend(summary);
            const fileHeader = `학교: ${school}\n학번: ${studentId}\n이름: ${name}\n응시 시각: ${timestamp}\n총점: ${totalScore.toFixed(0)}점\n\n---\n\n`;
            fileContent = fileHeader + fileContent;
            const fileNameTimestamp = now.toISOString().replace(/:/g, '-').slice(0, 19);
            const fileName = `${school}_${studentId}_${name}_${totalScore.toFixed(0)}점_${fileNameTimestamp}.txt`;
            download(fileName, fileContent);
        }

        function download(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
