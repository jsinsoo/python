<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자열 슬라이싱 단답형 20문항</title>
<style>
    body{
        font-family:'Malgun Gothic', Arial, sans-serif;
        margin:0;
        background:#f4f7fb;
        color:#222;
    }
    header{
        background:#263859;
        color:white;
        padding:22px;
        text-align:center;
    }
    .wrap{
        width:95%;
        max-width:1200px;
        margin:20px auto 80px;
    }
    .info, .card, .result{
        background:white;
        border-radius:14px;
        padding:18px;
        margin-bottom:18px;
        box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    .info input{
        padding:10px;
        margin:6px;
        border:1px solid #bbb;
        border-radius:8px;
        font-size:15px;
    }
    pre{
        background:#1e1e1e;
        color:#e6e6e6;
        padding:14px;
        border-radius:10px;
        overflow-x:auto;
        font-size:15px;
        line-height:1.55;
    }
    .qtitle{
        font-weight:bold;
        font-size:18px;
        margin-bottom:8px;
    }
    .answer{
        width:260px;
        max-width:90%;
        padding:10px;
        border:1px solid #aaa;
        border-radius:8px;
        font-size:16px;
    }
    button{
        border:0;
        border-radius:9px;
        padding:12px 18px;
        margin:6px 4px;
        cursor:pointer;
        font-size:16px;
        background:#263859;
        color:white;
    }
    button:hover{background:#17223b;}
    .smallBtn{
        padding:8px 12px;
        font-size:14px;
        background:#4b6584;
    }
    .feedback{
        margin-top:10px;
        padding:12px;
        border-radius:10px;
        display:none;
        line-height:1.7;
    }
    .ok{background:#e8f7ee; border-left:6px solid #22a06b;}
    .no{background:#fff0f0; border-left:6px solid #e74c3c;}
    .explain{
        color:#333;
        margin-top:6px;
    }
    .fixedBar{
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        background:#ffffff;
        border-top:1px solid #ddd;
        padding:10px;
        text-align:center;
        box-shadow:0 -3px 12px rgba(0,0,0,.08);
    }
    .score{
        font-size:22px;
        font-weight:bold;
        color:#263859;
    }
</style>
</head>
<body>
<header>
    <h1>문자열 슬라이싱 단답형 20문항</h1>
    <p>코드의 출력 결과를 입력하세요.</p>
</header>

<div class="wrap">
    <div class="info">
        <h2>응시자 정보</h2>
        학번 <input id="studentId" placeholder="예: 1101">
        이름 <input id="studentName" placeholder="예: 홍길동">
        <button class="smallBtn" onclick="startTest()">시작하기</button>
        <p id="startTimeText">시작 전입니다.</p>
    </div>

    <div id="quizArea"></div>

    <div class="result" id="resultBox" style="display:none;">
        <div class="score" id="scoreText"></div>
        <p id="summaryText"></p>
        <button onclick="downloadTxt()">TXT 저장</button>
    </div>
</div>

<div class="fixedBar">
    <button onclick="gradeQuiz()">제출 및 채점</button>
    <button onclick="showAllAnswers()">정답/풀이 전체 보기</button>
</div>

<script>
const questions = [
    {
        code:`s = "Python"\nprint(s[0])`,
        answer:"P",
        explain:"인덱스 0은 문자열의 첫 번째 문자입니다. Python의 첫 글자는 P입니다."
    },
    {
        code:`s = "Python"\nprint(s[-1])`,
        answer:"n",
        explain:"인덱스 -1은 문자열의 마지막 문자입니다. Python의 마지막 글자는 n입니다."
    },
    {
        code:`s = "Python"\nprint(s[1:4])`,
        answer:"yth",
        explain:"s[1:4]는 1번부터 3번 인덱스까지 가져옵니다. y, t, h가 출력됩니다."
    },
    {
        code:`s = "Python"\nprint(s[:3])`,
        answer:"Pyt",
        explain:"시작 인덱스를 생략하면 처음부터 가져옵니다. 0~2번 문자 Pyt가 출력됩니다."
    },
    {
        code:`s = "Python"\nprint(s[3:])`,
        answer:"hon",
        explain:"끝 인덱스를 생략하면 3번 인덱스부터 끝까지 가져옵니다."
    },
    {
        code:`s = "Python"\nprint(s[-3:])`,
        answer:"hon",
        explain:"-3은 뒤에서 세 번째 문자 h를 의미합니다. h부터 끝까지 출력됩니다."
    },
    {
        code:`s = "Python"\nprint(s[:-2])`,
        answer:"Pyth",
        explain:"s[:-2]는 처음부터 뒤에서 두 번째 문자 바로 앞까지 가져옵니다."
    },
    {
        code:`s = "Python"\nprint(s[::2])`,
        answer:"Pto",
        explain:"s[::2]는 처음부터 끝까지 2칸씩 건너뛰며 가져옵니다. 인덱스 0,2,4가 선택됩니다."
    },
    {
        code:`s = "Python"\nprint(s[1::2])`,
        answer:"yhn",
        explain:"1번 인덱스부터 2칸씩 이동합니다. 인덱스 1,3,5가 선택됩니다."
    },
    {
        code:`s = "Python"\nprint(s[::-1])`,
        answer:"nohtyP",
        explain:"s[::-1]은 문자열을 거꾸로 뒤집습니다."
    },
    {
        code:`s = "Hello World"\nprint(s[6:])`,
        answer:"World",
        explain:"인덱스 6은 W입니다. 6번부터 끝까지 World가 출력됩니다."
    },
    {
        code:`s = "Hello World"\nprint(s[:5])`,
        answer:"Hello",
        explain:"처음부터 5번 인덱스 바로 앞까지 가져오므로 Hello가 출력됩니다."
    },
    {
        code:`s = "Hello World"\nprint(s[::3])`,
        answer:"HlWl",
        explain:"0, 3, 6, 9번 인덱스 문자를 가져옵니다. H, l, W, l입니다."
    },
    {
        code:`s = "abcdefg"\nprint(s[2:6])`,
        answer:"cdef",
        explain:"2번 인덱스 c부터 5번 인덱스 f까지 출력됩니다. 끝 인덱스 6은 포함되지 않습니다."
    },
    {
        code:`s = "abcdefg"\nprint(s[-5:-2])`,
        answer:"cde",
        explain:"-5는 c, -2는 f입니다. 끝 인덱스는 포함되지 않아 cde가 출력됩니다."
    },
    {
        code:`s = "abcdefg"\nprint(s[5:2:-1])`,
        answer:"fed",
        explain:"5번 인덱스 f에서 시작해 2번 인덱스 바로 뒤까지 거꾸로 이동합니다. f, e, d가 출력됩니다."
    },
    {
        code:`s = "DataScience"\nprint(s[4:])`,
        answer:"Science",
        explain:"DataScience에서 4번 인덱스는 S입니다. S부터 끝까지 출력됩니다."
    },
    {
        code:`s = "DataScience"\nprint(s[:4])`,
        answer:"Data",
        explain:"처음부터 4번 인덱스 바로 앞까지 출력하므로 Data입니다."
    },
    {
        code:`s = "DataScience"\nprint(s[4:11:2])`,
        answer:"Sine",
        explain:"4번 S부터 10번 e까지 2칸씩 이동합니다. S, i, n, e가 출력됩니다."
    },
    {
        code:`s = "Information"\nprint(s[-4:])`,
        answer:"tion",
        explain:"뒤에서 네 번째 문자 t부터 끝까지 출력하므로 tion입니다."
    }
];

let startTime = "";
let lastResult = "";

function startTest(){
    startTime = new Date().toLocaleString();
    document.getElementById("startTimeText").innerText = "시작 시각: " + startTime;
}

function makeQuiz(){
    const area = document.getElementById("quizArea");
    questions.forEach((q, i)=>{
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <div class="qtitle">문항 ${i+1}. 다음 코드의 출력 결과는?</div>
            <pre>${q.code}</pre>
            <input class="answer" id="ans${i}" placeholder="출력 결과 입력">
            <div class="feedback" id="fb${i}"></div>
        `;
        area.appendChild(div);
    });
}

function gradeQuiz(){
    let score = 0;
    let lines = [];
    const sid = document.getElementById("studentId").value || "미입력";
    const name = document.getElementById("studentName").value || "미입력";
    const submitTime = new Date().toLocaleString();

    if(!startTime) startTest();

    lines.push("문자열 슬라이싱 단답형 20문항 결과");
    lines.push("학번: " + sid);
    lines.push("이름: " + name);
    lines.push("시작 시각: " + startTime);
    lines.push("제출 시각: " + submitTime);
    lines.push("----------------------------------------");

    questions.forEach((q, i)=>{
        const user = document.getElementById("ans"+i).value.trim();
        const fb = document.getElementById("fb"+i);
        const correct = user === q.answer;
        if(correct) score += 5;

        fb.style.display = "block";
        fb.className = "feedback " + (correct ? "ok" : "no");
        fb.innerHTML = `
            ${correct ? "정답입니다." : "오답입니다."}<br>
            입력: <b>${user || "미입력"}</b><br>
            정답: <b>${q.answer}</b>
            <div class="explain">풀이: ${q.explain}</div>
        `;

        lines.push(`문항 ${i+1}`);
        lines.push("코드: " + q.code.replaceAll("\n", " / "));
        lines.push("입력 답안: " + (user || "미입력"));
        lines.push("정답: " + q.answer);
        lines.push("결과: " + (correct ? "정답" : "오답"));
        lines.push("풀이: " + q.explain);
        lines.push("");
    });

    lines.push("최종 점수: " + score + " / 100");
    lastResult = lines.join("\n");

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("scoreText").innerText = `점수: ${score} / 100`;
    document.getElementById("summaryText").innerText = `총 20문항, 문항당 5점입니다. 제출 시각: ${submitTime}`;
    window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
}

function showAllAnswers(){
    questions.forEach((q, i)=>{
        const fb = document.getElementById("fb"+i);
        fb.style.display = "block";
        fb.className = "feedback ok";
        fb.innerHTML = `정답: <b>${q.answer}</b><div class="explain">풀이: ${q.explain}</div>`;
    });
}

function downloadTxt(){
    if(!lastResult){
        alert("먼저 제출 및 채점을 해주세요.");
        return;
    }
    const sid = document.getElementById("studentId").value || "학번";
    const name = document.getElementById("studentName").value || "이름";
    const scoreText = document.getElementById("scoreText").innerText.replace(/[^0-9]/g, "_");
    const now = new Date();
    const stamp = now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");

    const filename = `${sid}_${name}_문자열슬라이싱단답형_${stamp}.txt`;
    const blob = new Blob([lastResult], {type:"text/plain;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}

makeQuiz();
</script>
</body>
</html>
