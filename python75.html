<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주제별 파이썬 실험 코드 해석 75문항</title>
<style>
:root {
  --bg:#f5f7fb; --card:#ffffff; --ink:#172033; --muted:#64748b; --line:#d9e2ef;
  --blue:#1e3a8a; --teal:#0f766e; --soft:#eef2ff; --ok:#dcfce7; --bad:#fee2e2;
  --warn:#fff7ed; --code:#0b1020;
}
body.dark {
  --bg:#0f172a; --card:#111827; --ink:#e5e7eb; --muted:#94a3b8; --line:#334155;
  --soft:#1e293b; --ok:#064e3b; --bad:#7f1d1d; --warn:#451a03; --code:#020617;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Malgun Gothic',Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,var(--blue),var(--teal));color:white;padding:14px 20px;box-shadow:0 4px 16px #0004}
h1{margin:0 0 8px;font-size:23px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.controls input{padding:9px 11px;border:1px solid #ffffff77;border-radius:10px}
button{border:0;border-radius:10px;padding:9px 13px;font-weight:800;cursor:pointer}
.primary{background:#22c55e;color:#052e16}
.secondary{background:white;color:#172033}
.ghost{background:#ffffff22;color:white;border:1px solid #ffffff55}
main{max-width:1450px;margin:22px auto;padding:0 16px 100px}
.notice,.panel,.q{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 20px #00000012}
.notice{padding:18px;margin-bottom:18px}
.panel{padding:12px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#nav{display:flex;gap:6px;flex-wrap:wrap}
#nav button{padding:5px 9px;border-radius:999px;background:var(--soft);color:var(--ink);border:1px solid var(--line);font-size:12px}
#nav button.done{background:#bbf7d0;color:#052e16}
#nav button.wrong{background:#fecaca;color:#450a0a}
.q{padding:18px;margin:18px 0}
.q h2{font-size:22px;color:#1e3a8a;margin:0 0 8px}
body.dark .q h2{color:#93c5fd}
.meta{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}
.pill{background:#e0f2fe;color:#075985;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:700}
body.dark .pill{background:#0c4a6e;color:#bae6fd}
.situation{background:var(--warn);border-left:5px solid #f97316;padding:10px;border-radius:10px}
pre{background:var(--code);color:#e5e7eb;border-radius:15px;padding:15px;overflow:auto;font-size:14px;line-height:1.55;white-space:pre}
.option{display:block;margin:8px 0;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--soft);cursor:pointer}
.option input{margin-right:8px;transform:scale(1.12)}
.result{display:none;margin-top:12px;border-radius:12px;padding:12px;border:1px solid var(--line)}
.result.correct{background:var(--ok)}
.result.wrong{background:var(--bad)}
.solution{margin-top:8px;background:rgba(148,163,184,.16);padding:11px;border-radius:10px}
.fixed{position:fixed;left:0;right:0;bottom:0;background:#111827;color:white;padding:12px 18px;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;z-index:20}
.progressOuter{height:12px;background:#334155;border-radius:999px;overflow:hidden;width:260px}
.progressInner{height:100%;width:0%;background:#22c55e}
.small{color:var(--muted);font-size:13px}
.kbd{font-family:Consolas,monospace;background:#e2e8f0;color:#0f172a;border-radius:6px;padding:1px 5px}
body.dark .kbd{background:#334155;color:#f8fafc}
@media(max-width:760px){header{position:static}pre{font-size:12px}.controls input{width:100%}.progressOuter{width:180px}}
</style>
</head>
<body>
<header>
  <h1>주제별 파이썬 실험 코드 해석 75문항</h1>
  <div class="controls">
    <input id="sid" placeholder="학번 입력">
    <input id="sname" placeholder="이름 입력">
    <button class="primary" onclick="gradeAll()">채점하고 TXT 저장</button>
    <button class="secondary" onclick="resetQuiz()">다시 풀기</button>
    <button class="ghost" onclick="toggleDark()">다크모드</button>
    <span id="scoreTop">점수: 미채점</span>
  </div>
</header>
<main>
  <div class="notice">
    <b>풀이 방법:</b> 각 문항은 코드에 대한 설명 5개 중 <b>옳은 설명 3개를 모두 선택</b>하는 문제입니다.
    제출하면 <span class="kbd">학번_이름_점수_실험_응시시각.txt</span> 파일이 자동 저장됩니다.
    <br><span class="small">문항 수: 75개 · 각 문항 1점 · 문항별 정오답과 상세 풀이 포함</span>
  </div>
  <div class="panel">
    <b>문제 이동</b>
    <div id="nav"></div>
  </div>
  <div id="quiz"></div>
</main>
<div class="fixed">
  <button class="primary" onclick="gradeAll()">전체 채점 및 TXT 저장</button>
  <div class="progressOuter"><div class="progressInner" id="progress"></div></div>
  <span id="scoreBottom">0 / 75 선택 진행 중</span>
</div>
<script>

function esc(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = questions.map(q => `<button id="nav${q.no}" onclick="document.getElementById('q${q.no}').scrollIntoView({behavior:'smooth', block:'start'})">${q.no}</button>`).join('');
}

function renderQuiz() {
  const quiz = document.getElementById('quiz');
  quiz.innerHTML = questions.map(q => `
    <section class="q" id="q${q.no}">
      <h2>문항 ${q.no}. ${esc(q.title)}</h2>
      <div class="meta">
        <span class="pill">${esc(q.cat)}</span>
        <span class="pill">${esc(q.topic)}</span>
      </div>
      <p class="situation">${esc(q.situation)}</p>
      <pre><code>${esc(q.code)}</code></pre>
      <p><b>문제:</b> 다음 보기 중 코드에 대한 옳은 설명 3개를 모두 고르시오.</p>
      <div class="opts">
        ${q.options.map((op,i)=>`
          <label class="option">
            <input type="checkbox" name="q${q.no}" value="${i}" onchange="updateProgress()">
            ${i+1}. ${esc(op)}
          </label>
        `).join('')}
      </div>
      <div class="result" id="r${q.no}"></div>
    </section>
  `).join('');
}

function selected(qno) {
  return Array.from(document.querySelectorAll(`input[name="q${qno}"]:checked`)).map(x => Number(x.value)).sort((a,b)=>a-b);
}

function sameArray(a,b) {
  return a.length === b.length && a.every((v,i)=>v===b[i]);
}

function updateProgress() {
  const answered = questions.filter(q => selected(q.no).length > 0).length;
  document.getElementById('progress').style.width = (answered / questions.length * 100) + '%';
  document.getElementById('scoreBottom').textContent = `${answered} / ${questions.length} 선택 진행 중`;
}

function gradeAll() {
  const sid = document.getElementById('sid').value.trim();
  const sname = document.getElementById('sname').value.trim();
  if (!sid || !sname) {
    alert('학번과 이름을 먼저 입력하세요.');
    return;
  }
  let score = 0;
  let lines = [];
  const now = new Date();
  const stamp = now.getFullYear().toString()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0') + '_'
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0')
    + String(now.getSeconds()).padStart(2,'0');

  lines.push('주제별 파이썬 실험 코드 해석 결과');
  lines.push('학번: ' + sid);
  lines.push('이름: ' + sname);
  lines.push('응시시각: ' + now.toLocaleString('ko-KR'));
  lines.push('----------------------------------------');

  questions.forEach(q => {
    const ans = [...q.answer].sort((a,b)=>a-b);
    const sel = selected(q.no);
    const ok = sameArray(sel, ans);
    if (ok) score++;
    const r = document.getElementById('r' + q.no);
    r.style.display = 'block';
    r.className = 'result ' + (ok ? 'correct' : 'wrong');
    const ansText = ans.map(i=>i+1).join(', ');
    const selText = sel.length ? sel.map(i=>i+1).join(', ') : '미선택';
    r.innerHTML = `
      <b>${ok ? '정답' : '오답'}</b><br>
      선택: ${selText} / 정답: ${ansText}
      <div class="solution">${esc(q.solution)}</div>
    `;
    const navBtn = document.getElementById('nav' + q.no);
    navBtn.classList.remove('done','wrong');
    navBtn.classList.add(ok ? 'done' : 'wrong');

    lines.push('');
    lines.push(`문항 ${q.no}. ${q.title}`);
    lines.push('분야/주제: ' + q.cat + ' / ' + q.topic);
    lines.push('선택: ' + selText);
    lines.push('정답: ' + ansText);
    lines.push('정오답: ' + (ok ? '정답' : '오답'));
    lines.push('상세 풀이: ' + q.solution);
  });

  const scoreText = `${score} / ${questions.length}점`;
  document.getElementById('scoreTop').textContent = '점수: ' + scoreText;
  document.getElementById('scoreBottom').textContent = '최종 점수: ' + scoreText;

  lines.splice(4, 0, '점수: ' + scoreText);
  const filename = `${sid}_${sname}_${score}점_실험_${stamp}.txt`;
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function resetQuiz() {
  document.querySelectorAll('input[type="checkbox"]').forEach(x => x.checked = false);
  document.querySelectorAll('.result').forEach(x => {x.style.display='none'; x.innerHTML='';});
  document.querySelectorAll('#nav button').forEach(x => x.classList.remove('done','wrong'));
  document.getElementById('scoreTop').textContent = '점수: 미채점';
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleDark() {
  document.body.classList.toggle('dark');
}

renderNav();
renderQuiz();
updateProgress();
</script>
