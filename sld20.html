<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자열·리스트·딕셔너리 슬라이싱 OX·단답형 퀴즈</title>
<style>
    body{
        margin:0;
        font-family:'Malgun Gothic', Arial, sans-serif;
        background:#f4f7fb;
        color:#222;
    }
    header{
        background:#26364f;
        color:white;
        padding:22px 30px;
        text-align:center;
    }
    main{
        max-width:1100px;
        margin:24px auto;
        background:white;
        padding:28px;
        border-radius:18px;
        box-shadow:0 8px 24px rgba(0,0,0,.08);
    }
    h2{border-left:8px solid #4d79ff; padding-left:12px; margin-top:34px;}
    .info{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
        margin-bottom:20px;
    }
    input[type="text"]{
        padding:10px;
        border:1px solid #bbb;
        border-radius:8px;
        font-size:15px;
        width:95%;
    }
    .q{
        border:1px solid #dde3ee;
        background:#fbfcff;
        border-radius:14px;
        padding:16px;
        margin:14px 0;
    }
    .q-title{font-weight:bold; margin-bottom:8px;}
    code{
        display:block;
        white-space:pre-wrap;
        background:#1f2937;
        color:#e5e7eb;
        padding:12px;
        border-radius:10px;
        margin:8px 0;
        font-family:Consolas, monospace;
    }
    label{margin-right:18px; cursor:pointer;}
    button{
        border:0;
        border-radius:10px;
        padding:12px 20px;
        font-size:16px;
        cursor:pointer;
        margin:10px 6px 10px 0;
    }
    .submit{background:#315efb; color:white;}
    .reset{background:#e5e7eb;}
    #result{
        margin-top:24px;
        padding:20px;
        border-radius:14px;
        background:#eef4ff;
        display:none;
    }
    .correct{color:#006b2e; font-weight:bold;}
    .wrong{color:#c62828; font-weight:bold;}
    .explain{
        margin-top:8px;
        padding:10px;
        background:#fff;
        border-radius:8px;
        border-left:5px solid #8aa7ff;
    }
    .small{font-size:13px; color:#555;}
</style>
</head>
<body>
<header>
    <h1>문자열·리스트·딕셔너리 슬라이싱 OX·단답형 퀴즈</h1>
    <p>OX 10문항 + 단답형 10문항 / 총 20점</p>
</header>
<main>
    <div class="info">
        <div>학번<br><input type="text" id="studentId" placeholder="예: 1101"></div>
        <div>이름<br><input type="text" id="studentName" placeholder="예: 홍길동"></div>
    </div>

    <h2>Ⅰ. OX 퀴즈 10문항</h2>
    <div id="oxArea"></div>

    <h2>Ⅱ. 단답형 10문항</h2>
    <p class="small">정답은 따옴표 없이 입력하세요. 리스트나 딕셔너리는 Python 출력 형태로 입력하세요. 예: [2, 3], {'a': 1}</p>
    <div id="shortArea"></div>

    <button class="submit" onclick="gradeQuiz()">제출 및 채점</button>
    <button class="reset" onclick="location.reload()">다시 풀기</button>

    <div id="result"></div>
</main>

<script>
const oxQuestions = [
    {
        type:'문자열',
        q:'다음 코드의 출력은 bcd 이다.',
        code:`s = "abcdef"\nprint(s[1:4])`,
        answer:'O',
        exp:'문자열 인덱스 1부터 3까지 선택하므로 bcd가 출력된다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력은 [20, 30, 40] 이다.',
        code:`a = [10, 20, 30, 40, 50]\nprint(a[1:4])`,
        answer:'O',
        exp:'리스트 슬라이싱 a[1:4]는 인덱스 1, 2, 3의 값을 가져온다.'
    },
    {
        type:'딕셔너리',
        q:'다음 코드의 출력은 ["국어", "수학"] 이다.',
        code:`score = {"국어":90, "수학":95, "정보":100}\nprint(list(score.keys())[:2])`,
        answer:'O',
        exp:'딕셔너리의 key를 리스트로 바꾼 뒤 앞의 2개를 슬라이싱한다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력은 ace 이다.',
        code:`s = "abcdef"\nprint(s[::2])`,
        answer:'O',
        exp:'처음부터 끝까지 2칸씩 건너뛰므로 a, c, e가 선택된다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력은 [5, 4, 3] 이다.',
        code:`nums = [1, 2, 3, 4, 5]\nprint(nums[::-1][:3])`,
        answer:'O',
        exp:'nums[::-1]은 [5,4,3,2,1]이고, 앞 3개는 [5,4,3]이다.'
    },
    {
        type:'딕셔너리',
        q:'딕셔너리는 score[0:2]처럼 직접 슬라이싱할 수 있다.',
        code:`score = {"A":10, "B":20, "C":30}\nprint(score[0:2])`,
        answer:'X',
        exp:'딕셔너리는 순서 인덱스로 직접 슬라이싱할 수 없다. list(score.items())처럼 리스트로 바꿔야 한다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력은 nohtyP 이다.',
        code:`s = "Python"\nprint(s[::-1])`,
        answer:'O',
        exp:'[::-1]은 전체 문자열을 거꾸로 뒤집는다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력은 [30, 40] 이다.',
        code:`a = [10, 20, 30, 40, 50]\nprint(a[2:-1])`,
        answer:'O',
        exp:'인덱스 2부터 마지막 바로 앞까지 가져오므로 [30, 40]이다.'
    },
    {
        type:'딕셔너리',
        q:'다음 코드의 출력은 [("a", 1), ("b", 2)] 이다.',
        code:`d = {"a":1, "b":2, "c":3}\nprint(list(d.items())[:2])`,
        answer:'O',
        exp:'items()를 리스트로 바꾼 뒤 앞의 두 쌍을 가져온다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력은 cde 이다.',
        code:`s = "abcdef"\nprint(s[2:5])`,
        answer:'O',
        exp:'인덱스 2, 3, 4의 문자인 c, d, e가 출력된다.'
    }
];

const shortQuestions = [
    {
        type:'문자열',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`s = "Information"\nprint(s[0:4])`,
        answer:'Info',
        exp:'0번부터 3번 인덱스까지 선택하여 Info가 출력된다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`a = [3, 6, 9, 12, 15]\nprint(a[1:4])`,
        answer:'[6, 9, 12]',
        exp:'인덱스 1부터 3까지의 값은 6, 9, 12이다.'
    },
    {
        type:'딕셔너리',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`d = {"봄":1, "여름":2, "가을":3, "겨울":4}\nprint(list(d.keys())[1:3])`,
        answer:"['여름', '가을']",
        exp:'key 목록 중 인덱스 1, 2에 해당하는 여름, 가을이 출력된다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`s = "abcdefg"\nprint(s[::3])`,
        answer:'adg',
        exp:'0번부터 3칸씩 건너뛰어 a, d, g가 선택된다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`x = ["A", "B", "C", "D", "E"]\nprint(x[-3:])`,
        answer:"['C', 'D', 'E']",
        exp:'뒤에서 세 번째 원소부터 끝까지 가져온다.'
    },
    {
        type:'딕셔너리',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`d = {"A":10, "B":20, "C":30}\nprint(list(d.values())[:2])`,
        answer:'[10, 20]',
        exp:'value 목록 중 앞의 두 값 10, 20을 가져온다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`s = "KOREA"\nprint(s[::-1])`,
        answer:'AEROK',
        exp:'문자열 전체를 역순으로 출력한다.'
    },
    {
        type:'리스트',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`nums = [1, 2, 3, 4, 5, 6]\nprint(nums[::2])`,
        answer:'[1, 3, 5]',
        exp:'처음부터 2칸씩 이동하여 1, 3, 5가 선택된다.'
    },
    {
        type:'딕셔너리',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`d = {"x":100, "y":200, "z":300}\nprint(list(d.items())[1:])`,
        answer:"[('y', 200), ('z', 300)]",
        exp:'items()를 리스트로 만든 뒤 인덱스 1부터 끝까지 가져온다.'
    },
    {
        type:'문자열',
        q:'다음 코드의 출력 결과를 쓰시오.',
        code:`s = "slice"\nprint(s[1:-1])`,
        answer:'lic',
        exp:'인덱스 1부터 마지막 문자 바로 앞까지 선택한다.'
    }
];

function render(){
    const oxArea = document.getElementById('oxArea');
    const shortArea = document.getElementById('shortArea');

    oxQuestions.forEach((item, i)=>{
        oxArea.innerHTML += `
        <div class="q">
            <div class="q-title">${i+1}. [${item.type}] ${item.q}</div>
            <code>${item.code}</code>
            <label><input type="radio" name="ox${i}" value="O"> O</label>
            <label><input type="radio" name="ox${i}" value="X"> X</label>
            <div id="oxResult${i}"></div>
        </div>`;
    });

    shortQuestions.forEach((item, i)=>{
        shortArea.innerHTML += `
        <div class="q">
            <div class="q-title">${i+1}. [${item.type}] ${item.q}</div>
            <code>${item.code}</code>
            <input type="text" id="short${i}" placeholder="정답 입력">
            <div id="shortResult${i}"></div>
        </div>`;
    });
}

function normalize(x){
    return x.trim().replace(/\s+/g, ' ');
}

function gradeQuiz(){
    let score = 0;
    let total = oxQuestions.length + shortQuestions.length;
    let detail = [];

    oxQuestions.forEach((item, i)=>{
        const checked = document.querySelector(`input[name="ox${i}"]:checked`);
        const user = checked ? checked.value : '';
        const ok = user === item.answer;
        if(ok) score++;
        document.getElementById(`oxResult${i}`).innerHTML = `
            <div class="${ok ? 'correct':'wrong'}">${ok ? '정답':'오답'} / 내 답: ${user || '미입력'} / 정답: ${item.answer}</div>
            <div class="explain">해설: ${item.exp}</div>`;
        detail.push(`${i+1}. OX / 내 답: ${user || '미입력'} / 정답: ${item.answer} / ${ok?'정답':'오답'}`);
    });

    shortQuestions.forEach((item, i)=>{
        const user = document.getElementById(`short${i}`).value;
        const ok = normalize(user) === normalize(item.answer);
        if(ok) score++;
        document.getElementById(`shortResult${i}`).innerHTML = `
            <div class="${ok ? 'correct':'wrong'}">${ok ? '정답':'오답'} / 내 답: ${user || '미입력'} / 정답: ${item.answer}</div>
            <div class="explain">해설: ${item.exp}</div>`;
        detail.push(`${i+1}. 단답형 / 내 답: ${user || '미입력'} / 정답: ${item.answer} / ${ok?'정답':'오답'}`);
    });

    const sid = document.getElementById('studentId').value || '학번미입력';
    const name = document.getElementById('studentName').value || '이름미입력';
    const now = new Date().toLocaleString();

    const result = document.getElementById('result');
    result.style.display = 'block';
    result.innerHTML = `
        <h2>채점 결과</h2>
        <p><b>${sid} ${name}</b></p>
        <p><b>점수: ${score} / ${total}</b></p>
        <p>응시 시각: ${now}</p>
        <button class="submit" onclick="downloadTxt()">결과 TXT 저장</button>
    `;

    window.resultText = `문자열·리스트·딕셔너리 슬라이싱 OX·단답형 퀴즈\n학번: ${sid}\n이름: ${name}\n점수: ${score}/${total}\n응시시각: ${now}\n\n${detail.join('\n')}`;
    window.fileName = `${sid}_${name}_${score}점_슬라이싱퀴즈_${now.replace(/[\\/:*?"<>|.\s]/g,'_')}.txt`;
    result.scrollIntoView({behavior:'smooth'});
}

function downloadTxt(){
    const blob = new Blob([window.resultText], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = window.fileName || 'result.txt';
    a.click();
    URL.revokeObjectURL(a.href);
}

render();
</script>
</body>
</html>
