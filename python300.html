<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 파이썬 문법</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Malgun Gothic',sans-serif;
}

/* 상단 초소형 메뉴바 */
.topbar{
    height:36px;
    background:linear-gradient(
        90deg,
        #1e3c72,
        #2a5298
    );
    display:flex;
    align-items:center;
    padding:0 10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

/* 드롭다운 */
#menu{
    height:26px;
    min-width:260px;
    border:none;
    border-radius:5px;
    padding:0 8px;
    font-size:13px;
    background:white;
    cursor:pointer;
}

/* 본문 */
#viewer{
    width:100%;
    height:calc(100vh - 36px);
    border:none;
    background:white;
}
</style>

<script>
function changePage(){

    let page =
    document.getElementById(
        "menu"
    ).value;

    if(page){
        document.getElementById(
            "viewer"
        ).src = page;
    }
}
</script>

</head>
<body>

<div class="topbar">

<select
    id="menu"
    onchange="changePage()">

<option value="python50a.html">
📖 파이썬 문법 1편
</option>

<option value="python50b.html">
📖 파이썬 문법 2편
</option>

<option value="python50c.html">
📖 파이썬 문법 3편
</option>

<option value="python50d.html">
📖 파이썬 문법 4편
</option>

<option value="python50e.html">
📖 파이썬 문법 5편
</option>

<option value="python50f.html">
📖 파이썬 문법 6편
</option>

</select>

</div>

<iframe
    id="viewer"
    src="python50a.html">
</iframe>

</body>
</html>
